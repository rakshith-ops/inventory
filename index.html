<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTG Group | Inventory Dashboard</title>
    <style>
        :root { --primary: #1e293b; --accent: #b45309; --avail: #10b981; --booked: #f59e0b; --sold: #ef4444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Project Tabs */
        .project-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; overflow-x: auto; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600; background: #f1f5f9; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; }

        /* Forms & Controls */
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: #fffbeb; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fef3c7; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f1f5f9; border-bottom: 2px solid #e2e8f0; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-Available { background: #dcfce7; color: #166534; }
        .status-Booked { background: #fef3c7; color: #92400e; }
        .status-Sold { background: #fee2e2; color: #991b1b; }

        .btn { cursor: pointer; border: none; border-radius: 6px; padding: 8px 15px; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; }
        #loginOverlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div style="background:white; padding:40px; border-radius:12px; width:300px; text-align:center;">
        <h3>LTG Inventory Login</h3>
        <input type="password" id="lp" placeholder="Password (admin123)" style="width:100%; margin-bottom:15px;">
        <button class="btn btn-main" style="width:100%" onclick="login()">Enter</button>
    </div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>LTG Group Project Management</h2>
        <button class="btn" style="background:#10b981; color:white" onclick="exportData()">📥 Export CSV</button>
    </div>

    <div class="project-tabs" id="projectTabs">
        </div>

    <div class="control-panel">
        <input type="text" id="p_no" placeholder="Plot/Unit No.">
        <input type="text" id="p_dim" placeholder="Dimension (e.g. 30x40)">
        <input type="number" id="p_area" placeholder="SBA / Area">
        <select id="p_facing">
            <option value="East">East Facing</option>
            <option value="West">West Facing</option>
            <option value="North">North Facing</option>
            <option value="South">South Facing</option>
        </select>
        <button class="btn btn-main" onclick="addItem()">+ Add to Project</button>
    </div>

    <div style="margin-bottom:15px;">
        <input type="text" id="search" placeholder="Search Plot No or Facing..." style="width:100%; box-sizing:border-box;" onkeyup="render()">
    </div>

    <table>
        <thead>
            <tr>
                <th>Unit/Plot</th>
                <th>Dimension</th>
                <th>Area (SqFt)</th>
                <th>Facing</th>
                <th>Status</th>
                <th>Customer Details</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // Initial Projects based on your files
    let projects = JSON.parse(localStorage.getItem('ltg_projects')) || {
        "LTG-BRV E-City": [],
        "LTG AIP": [],
        "LTG Indraprastha": []
    };
    
    let currentProject = "LTG-BRV E-City";

    function login() {
        if(document.getElementById('lp').value === 'admin123') {
            document.getElementById('loginOverlay').style.display = 'none';
            init();
        }
    }

    function init() {
        const tabContainer = document.getElementById('projectTabs');
        tabContainer.innerHTML = '';
        Object.keys(projects).forEach(name => {
            const btn = document.createElement('div');
            btn.className = `tab ${name === currentProject ? 'active' : ''}`;
            btn.innerText = name;
            btn.onclick = () => { currentProject = name; init(); };
            tabContainer.appendChild(btn);
        });
        render();
    }

    function addItem() {
        const unit = document.getElementById('p_no').value;
        const dim = document.getElementById('p_dim').value;
        const area = document.getElementById('p_area').value;
        const face = document.getElementById('p_facing').value;

        if(!unit) return alert("Enter Unit Number");

        projects[currentProject].push({
            unit, dim, area, face, status: 'Available', client: '-', phone: '-'
        });
        save();
    }

    function updateStatus(i, newStatus) {
        let client = '-';
        let phone = '-';
        if(newStatus === 'Booked') {
            client = prompt("Customer Name:");
            phone = prompt("Customer Phone:");
            if(!client) return;
        }
        projects[currentProject][i].status = newStatus;
        projects[currentProject][i].client = client || '-';
        projects[currentProject][i].phone = phone || '-';
        save();
    }

    function save() {
        localStorage.setItem('ltg_projects', JSON.stringify(projects));
        render();
    }

    function render() {
        const body = document.getElementById('tableBody');
        const query = document.getElementById('search').value.toLowerCase();
        body.innerHTML = '';

        projects[currentProject].forEach((p, i) => {
            if(!p.unit.toLowerCase().includes(query) && !p.face.toLowerCase().includes(query)) return;

            body.innerHTML += `
                <tr>
                    <td><strong>${p.unit}</strong></td>
                    <td>${p.dim || '-'}</td>
                    <td>${p.area}</td>
                    <td>${p.face}</td>
                    <td><span class="status status-${p.status}">${p.status}</span></td>
                    <td>${p.client}<br><small>${p.phone}</small></td>
                    <td>
                        <select onchange="updateStatus(${i}, this.value)">
                            <option value="">Update Status</option>
                            <option value="Available">Available</option>
                            <option value="Booked">Booked</option>
                            <option value="Sold">Sold</option>
                        </select>
                        <button style="color:red; background:none; border:none; cursor:pointer" onclick="deleteItem(${i})">✕</button>
                    </td>
                </tr>
            `;
        });
    }

    function deleteItem(i) {
        if(confirm("Remove this unit?")) {
            projects[currentProject].splice(i, 1);
            save();
        }
    }

    function exportData() {
        let csv = "Project,Unit,Dimension,Area,Facing,Status,Customer,Phone\n";
        for(let proj in projects) {
            projects[proj].forEach(p => {
                csv += `${proj},${p.unit},${p.dim},${p.area},${p.face},${p.status},${p.client},${p.phone}\n`;
            });
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `LTG_Global_Inventory.csv`;
        a.click();
    }
</script>
</body>
</html>
