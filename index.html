<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Inventory | Vercel Live</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .grid-form { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 8px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1d4ed8; }
        .btn-export { background: #10b981; color: white; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f1f5f9; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #e2e8f0; }
        #loginOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>🔐 Secure Access</h3>
        <p style="font-size: 0.9rem; color: #64748b;">User: admin | Pass: password</p>
        <input type="text" id="user" placeholder="Username" style="width:100%; margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Password" style="width:100%; margin-bottom:20px;">
        <button class="btn-add" style="width:100%" onclick="login()">Sign In</button>
    </div>
</div>

<div class="container">
    <h2>
        📦 Inventory System
        <button class="btn-export" onclick="exportToCSV()">📥 Export to Excel (CSV)</button>
    </h2>

    <div class="grid-form">
        <input type="text" id="itemName" placeholder="Item Name (e.g. Dell Laptop)">
        <input type="number" id="itemQty" placeholder="Qty">
        <select id="itemCat">
            <option value="Electronics">Electronics</option>
            <option value="Furniture">Furniture</option>
            <option value="Office Supplies">Office Supplies</option>
        </select>
        <button class="btn-add" id="saveBtn" onclick="saveItem()">Add Item</button>
        <input type="hidden" id="editIndex">
    </div>

    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th style="text-align:right">Actions</th>
            </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
    </table>
    
    <p style="margin-top:30px; font-size:0.8rem; color:#94a3b8; text-align:center;">
        Data is saved locally in your browser. Use "Export" to backup your list.
    </p>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('vercel_inv_data')) || [];

    function login() {
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'password') {
            document.getElementById('loginOverlay').style.display = 'none';
            render();
        } else { alert('Wrong credentials'); }
    }

    function saveItem() {
        const name = document.getElementById('itemName').value;
        const qty = document.getElementById('itemQty').value;
        const cat = document.getElementById('itemCat').value;
        const index = document.getElementById('editIndex').value;

        if(!name || !qty) return alert('Please enter name and quantity');

        const item = { name, qty, cat };
        if(index === "") { inventory.push(item); } 
        else { inventory[index] = item; document.getElementById('editIndex').value = ""; }

        localStorage.setItem('vercel_inv_data', JSON.stringify(inventory));
        resetForm();
        render();
    }

    function render() {
        const body = document.getElementById('inventoryBody');
        body.innerHTML = '';
        inventory.forEach((item, index) => {
            body.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td><span class="badge">${item.cat}</span></td>
                    <td>${item.qty}</td>
                    <td style="text-align:right">
                        <button style="background:#fef3c7; color:#92400e;" onclick="editItem(${index})">Edit</button>
                        <button style="background:#fee2e2; color:#991b1b;" onclick="deleteItem(${index})">Del</button>
                    </td>
                </tr>`;
        });
    }

    function editItem(i) {
        document.getElementById('itemName').value = inventory[i].name;
        document.getElementById('itemQty').value = inventory[i].qty;
        document.getElementById('itemCat').value = inventory[i].cat;
        document.getElementById('editIndex').value = i;
        document.getElementById('saveBtn').innerText = "Update";
    }

    function deleteItem(i) {
        if(confirm('Delete this item?')) {
            inventory.splice(i, 1);
            localStorage.setItem('vercel_inv_data', JSON.stringify(inventory));
            render();
        }
    }

    function resetForm() {
        document.getElementById('itemName').value = '';
        document.getElementById('itemQty').value = '';
        document.getElementById('saveBtn').innerText = "Add Item";
    }

    function exportToCSV() {
        let csv = "Item Name,Category,Quantity\n";
        inventory.forEach(row => {
            csv += `${row.name},${row.cat},${row.qty}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'inventory_backup.csv');
        a.click();
    }
</script>
</body>
</html>
